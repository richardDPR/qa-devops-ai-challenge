name: QA CI Pipeline

on:
  pull_request:
    branches: [ main, feature/qa-pipeline ]
  push:
    branches: [ main, feature/qa-pipeline ]

jobs:
  qa-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        run: npm test

      - name: Generate Jest HTML report
        run: |
          mkdir -p evidences
          npx jest --reporters=default --reporters=jest-html-reporter

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qa-evidences
          path: evidences/
          
      - name: Upload Jest HTML report
        uses: actions/upload-artifact@v4
        with:
          name: jest-html-report
          path: evidences/report.html
          
      - name: Upload Jest logs
        uses: actions/upload-artifact@v4
        with:
          name: jest-logs
          path: evidences/logs/

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: evidences/screenshots/

      # 🔥 Nueva sección: pruebas de performance con K6
      - name: Install K6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.50.0/k6-v0.50.0-linux-amd64.tar.gz -L | tar xvz
          sudo mv k6-v0.50.0-linux-amd64/k6 /usr/local/bin/

      - name: Run K6 performance tests
        run: |
          mkdir -p evidences
          k6 run performance/k6/script.js > evidences/k6-results.txt

      - name: Upload K6 results
        uses: actions/upload-artifact@v4
        with:
          name: k6-performance-results
          path: evidences/k6-results.txt
